<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body style="text-align:center; margin-top:50px; font-family:Arial;">

  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email"><br><br>
  <input type="password" id="password" placeholder="Password"><br><br>

  <button id="signup">Sign Up</button>
  <button id="login">Login</button>
  <button id="logout">Logout</button>

  <p id="message"></p>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDSvyQ45TfarzDwuKZ0Yox2wOmaJlJU8ZY",
  authDomain: "hello-login-app.firebaseapp.com",
  projectId: "hello-login-app",
  storageBucket: "hello-login-app.firebasestorage.app",
  messagingSenderId: "149479552320",
  appId: "1:149479552320:web:3e4efd1435ec74d05df6a5"
};


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const message = document.getElementById("message");

    document.getElementById("signup").onclick = () => {
      createUserWithEmailAndPassword(auth, email.value, password.value)
        .then(() => message.innerText = "Signup successful")
        .catch(err => message.innerText = err.message);
    };

    document.getElementById("login").onclick = () => {
      signInWithEmailAndPassword(auth, email.value, password.value)
        .then(() => message.innerText = "Login successful")
        .catch(err => message.innerText = err.message);
    };

    document.getElementById("logout").onclick = () => {
      signOut(auth).then(() => message.innerText = "Logged out");
    };
  </script>

</body>
</html>
